<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyCinema Pro v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #070b14; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .poster-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .poster-grid { grid-template-columns: repeat(4, 1fr); } }
        .poster-card { position: relative; aspect-ratio: 2/3; border-radius: 12px; overflow: hidden; background: #111827; border: 1px solid rgba(255,255,255,0.05); }
        .poster-card img { width: 100%; height: 100%; object-fit: cover; }
        .fav-btn { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); width: 32px; height: 32px; border-radius: 50%; display: flex; items-center; justify-content: center; z-index: 10; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px); }
        .fav-active { color: #f59e0b !important; }
        #detailView { display: none; position: fixed; inset: 0; background: #070b14; z-index: 100; overflow-y: auto; padding: 20px; }
        .badge-info { background: rgba(59, 130, 246, 0.1); color: #60a5fa; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; border: 1px solid rgba(59, 130, 246, 0.2); }
        .cast-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #3b82f6; }
    </style>
</head>
<body class="p-4 pb-20">

    <div id="detailView">
        <button onclick="closeDetails()" class="mb-6 bg-slate-800 text-white px-6 py-2 rounded-full font-bold border border-white/10"><i class="fas fa-arrow-left mr-2"></i> VOLVER</button>
        <div id="detailContent"></div>
    </div>

    <div id="mainView">
        <h1 class="text-3xl font-black text-center text-blue-500 mb-8 italic">MyCinema <span class="text-white">PRO</span></h1>
        
        <div class="flex gap-2 mb-6">
            <input id="searchInput" type="text" placeholder="¿Qué quieres ver?" class="bg-slate-900 w-full p-4 rounded-xl border border-slate-800 outline-none">
            <button onclick="performSearch()" class="bg-blue-600 px-6 rounded-xl active:scale-95"><i class="fas fa-search"></i></button>
        </div>

        <div id="favSection" class="mb-10 hidden">
            <h2 class="text-sm font-bold text-yellow-500 uppercase tracking-widest mb-4"><i class="fas fa-star mr-2"></i> Mis Favoritos</h2>
            <div id="favGrid" class="poster-grid"></div>
            <div class="h-px bg-white/10 mt-8 w-full"></div>
        </div>

        <div id="searchTitle" class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-4 hidden">Resultados</div>
        <div id="resultsArea" class="poster-grid"></div>
    </div>

    <script>
        const API_KEY = 'c166cf26ff659581a08da20ca9391db3';
        let favorites = JSON.parse(localStorage.getItem('myCinemaFavs')) || [];

        function saveFavs() { localStorage.setItem('myCinemaFavs', JSON.stringify(favorites)); renderFavs(); }

        function toggleFav(e, id, title, poster, type) {
            e.stopPropagation();
            const index = favorites.findIndex(f => f.id === id);
            if(index > -1) { favorites.splice(index, 1); } 
            else { favorites.push({id, title, poster, type}); }
            saveFavs();
            performSearch(); // Refresca iconos en búsqueda si está abierta
        }

        function renderFavs() {
            const section = document.getElementById('favSection');
            const grid = document.getElementById('favGrid');
            if(favorites.length === 0) { section.classList.add('hidden'); return; }
            section.classList.remove('hidden');
            grid.innerHTML = favorites.map(f => `
                <div class="poster-card shadow-lg" onclick="openFullDetails(${f.id}, '${f.type}')">
                    <button class="fav-btn fav-active" onclick="toggleFav(event, ${f.id})"><i class="fas fa-star"></i></button>
                    <img src="https://image.tmdb.org/t/p/w342${f.poster}">
                </div>
            `).join('');
        }

        async function performSearch() {
            const q = document.getElementById('searchInput').value;
            if(!q) return;
            document.getElementById('searchTitle').classList.remove('hidden');
            const area = document.getElementById('resultsArea');
            area.innerHTML = '<p class="col-span-full text-center animate-pulse">Buscando...</p>';
            
            try {
                const response = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(q)}&language=es-ES`);
                const data = await response.json();
                area.innerHTML = "";
                const filtered = data.results.filter(i => i.media_type !== 'person' && i.poster_path).slice(0, 12);
                
                filtered.forEach(item => {
                    const isFav = favorites.some(f => f.id === item.id);
                    const div = document.createElement('div');
                    div.className = "poster-card shadow-lg";
                    div.onclick = () => openFullDetails(item.id, item.media_type);
                    div.innerHTML = `
                        <button class="fav-btn ${isFav ? 'fav-active' : 'text-white'}" 
                            onclick="toggleFav(event, ${item.id}, '${(item.title || item.name).replace(/'/g, "")}', '${item.poster_path}', '${item.media_type}')">
                            <i class="fas fa-star"></i>
                        </button>
                        <img src="https://image.tmdb.org/t/p/w342${item.poster_path}" loading="lazy">
                    `;
                    area.appendChild(div);
                });
            } catch (e) { area.innerHTML = "Error de conexión."; }
        }

        async function openFullDetails(id, type) {
            const detailView = document.getElementById('detailView');
            const content = document.getElementById('detailContent');
            detailView.style.display = 'block';
            content.innerHTML = '<p class="text-center mt-20">Cargando...</p>';
            try {
                const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&append_to_response=videos,credits,watch/providers&language=es-ES`);
                const d = await res.json();
                const trailer = d.videos?.results?.find(v => v.type === 'Trailer');
                const cast = d.credits?.cast?.slice(0, 6) || [];
                const providers = d['watch/providers']?.results?.ES?.flatrate || [];
                
                content.innerHTML = `
                    <div class="rounded-2xl overflow-hidden bg-black mb-6 border border-white/10 shadow-2xl">
                        ${trailer ? `<iframe class="w-full aspect-video" src="https://www.youtube-nocookie.com/embed/${trailer.key}?autoplay=1" frameborder="0" allowfullscreen></iframe>` 
                        : `<img src="https://image.tmdb.org/t/p/w780${d.backdrop_path}" class="w-full h-48 object-cover opacity-50">`}
                    </div>
                    <h2 class="text-3xl font-black mb-3">${d.title || d.name}</h2>
                    <div class="flex flex-wrap gap-2 mb-6">
                        <span class="badge-info text-yellow-500 border-yellow-500/30">★ ${d.vote_average?.toFixed(1)}</span>
                        <span class="badge-info">${type==='movie' ? d.runtime+' min' : d.number_of_seasons+' Temp.'}</span>
                        <span class="badge-info">${new Date(d.release_date || d.first_air_date).getFullYear()}</span>
                    </div>
                    <div class="space-y-6">
                        <section><h4 class="text-[10px] font-bold text-slate-500 uppercase mb-2 italic">Sinopsis</h4><p class="text-sm leading-relaxed text-slate-300">${d.overview || 'Sin descripción.'}</p></section>
                        <section><h4 class="text-[10px] font-bold text-slate-500 uppercase mb-3 italic">Dónde Ver</h4><div class="flex flex-wrap gap-3">
                            ${providers.map(p => `<img src="https://image.tmdb.org/t/p/original${p.logo_path}" class="w-10 h-10 rounded-lg">`).join('') || '<p class="text-xs italic text-slate-600">No disponible en streaming.</p>'}
                        </div></section>
                        <section><h4 class="text-[10px] font-bold text-slate-500 uppercase mb-4 italic">Reparto</h4><div class="flex gap-4 overflow-x-auto pb-4">
                            ${cast.map(c => `<div class="flex-shrink-0 text-center w-20"><img src="https://image.tmdb.org/t/p/w185${c.profile_path}" class="cast-img mx-auto mb-2" onerror="this.src='https://via.placeholder.com/60'"><p class="text-[9px] font-bold line-clamp-1">${c.name}</p></div>`).join('')}
                        </div></section>
                    </div>
                `;
            } catch (e) { content.innerHTML = "Error."; }
        }

        function closeDetails() { document.getElementById('detailView').style.display = 'none'; }
        renderFavs();
    </script>
</body>
</html>
