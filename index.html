<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCinema - Tu Guía de Cine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0b1120; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05); }
        .movie-card { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .synopsis-scroll {
            max-height: 120px;
            overflow-y: auto;
            padding-right: 8px;
        }
        .synopsis-scroll::-webkit-scrollbar { width: 3px; }
        .synopsis-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 pb-24">

    <main class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent tracking-tight italic">MyCinema</h1>
            <p class="text-slate-400 text-sm mt-1">Explora, busca y guarda tus favoritos</p>
        </header>

        <div class="glass rounded-2xl p-2 flex items-center mb-8 shadow-xl max-w-2xl mx-auto border border-white/5">
            <input id="searchInput" type="text" placeholder="¿Qué quieres ver hoy?" 
                   class="bg-transparent w-full p-3 outline-none text-slate-100 placeholder:text-slate-500">
            <button onclick="searchMedia()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl transition-all active:scale-95">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <p class="col-span-full text-center text-slate-500 italic">Escribe el nombre de una película o serie...</p>
        </div>

        <section class="mt-12 border-t border-slate-800 pt-8">
            <h3 class="text-xl font-bold mb-5 flex items-center gap-2.5 text-blue-400">
                <i class="fas fa-star"></i> Mis Favoritos en MyCinema
            </h3>
            <div id="favList" class="space-y-3"></div>
        </section>
    </main>

    <script>
        const API_KEY = 'c166cf26ff659581a08da20ca9391db3'; // <--- PEGA TU CLAVE AQUÍ
        let favorites = JSON.parse(localStorage.getItem('myFavs')) || [];
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        async function searchMedia() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '<div class="col-span-full text-center py-10"><i class="fas fa-circle-notch fa-spin text-3xl text-blue-500"></i></div>';
            
            try {
                const searchRes = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=es-ES`);
                const searchData = await searchRes.json();
                const items = searchData.results.filter(i => i.media_type === 'movie' || i.media_type === 'tv').slice(0, 8);

                if(items.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center text-slate-500">No se encontraron coincidencias en MyCinema.</p>';
                    return;
                }

                grid.innerHTML = ''; 
                
                for (const item of items) {
                    await sleep(200); // Retraso para evitar error 500
                    try {
                        const details = await getExtraDetails(item);
                        if(details) renderCard(details);
                    } catch (err) { console.warn("Error en un item"); }
                }
            } catch (e) { 
                grid.innerHTML = '<p class="col-span-full text-center text-red-400">Error de conexión. Inténtalo de nuevo en unos segundos.</p>';
            }
        }

        async function getExtraDetails(item) {
            const res = await fetch(`https://api.themoviedb.org/3/${item.media_type}/${item.id}?api_key=${API_KEY}&append_to_response=watch/providers,release_dates,content_ratings&language=es-ES`);
            if(!res.ok) return null; 
            const data = await res.json();
            return { ...data, media_type: item.media_type };
        }

        function renderCard(data) {
            const grid = document.getElementById('resultsGrid');
            
            let rating = "T.P.";
            if (data.media_type === 'movie') {
                const release = data.release_dates?.results?.find(r => r.iso_3166_1 === 'ES');
                rating = release?.release_dates[0]?.certification || "T.P.";
            } else {
                const ratingES = data.content_ratings?.results?.find(r => r.iso_3166_1 === 'ES');
                rating = ratingES?.rating || "T.P.";
            }

            const isFav = favorites.some(f => f.id === data.id && f.type === data.media_type);

            const cardHtml = `
                <div class="movie-card bg-slate-950 rounded-3xl overflow-hidden border border-slate-800 flex flex-col shadow-2xl">
                    <div class="relative h-56 shrink-0">
                        <img src="${data.poster_path ? 'https://image.tmdb.org/t/p/w500'+data.poster_path : 'https://via.placeholder.com/500x750?text=Sin+Imagen'}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20"></div>
                        <button onclick="toggleFavorite(${data.id}, '${(data.title || data.name).replace(/'/g, "")}', '${data.media_type}')" 
                                class="absolute top-4 right-4 bg-black/60 p-2.5 rounded-full border border-white/10 backdrop-blur-sm shadow-lg">
                            <i class="${isFav ? 'fas' : 'far'} fa-star text-yellow-400"></i>
                        </button>
                        <div class="absolute bottom-3 left-4 right-4">
                            <h2 class="text-xl font-bold text-white leading-tight drop-shadow-md">${data.title || data.name}</h2>
                            <div class="flex gap-2 mt-1.5 items-center">
                                <span class="text-[9px] bg-blue-600 px-2 py-0.5 rounded text-white font-black uppercase tracking-wider">${data.media_type === 'movie' ? 'CINE' : 'SERIE'}</span>
                                <span class="text-[9px] bg-slate-800 px-2 py-0.5 rounded text-yellow-500 font-bold border border-slate-700">${rating}</span>
                            </div>
                        </div>
                    </div>
                    <div class="p-5 flex-1 flex flex-col">
                        <div class="synopsis-scroll mb-5">
                            <p class="text-slate-300 text-xs leading-relaxed">
                                ${data.overview || "Sinopsis no disponible en este momento."}
                            </p>
                        </div>
                        
                        <div class="mt-auto pt-4 border-t border-slate-900 flex flex-col gap-4">
                            <div class="flex items-center justify-between">
                                <div class="flex gap-2">
                                    ${(data['watch/providers']?.results?.ES?.flatrate || []).slice(0,4).map(p => `
                                        <img src="https://image.tmdb.org/t/p/original${p.logo_path}" class="w-8 h-8 rounded-lg shadow-md border border-slate-800" title="${p.provider_name}">
                                    `).join('')}
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] text-slate-500 font-medium">
                                        ${data.media_type === 'movie' ? 
                                            `<i class="far fa-clock mr-1"></i> ${data.runtime || '?'} min` : 
                                            `<i class="fas fa-tv mr-1"></i> ${data.number_of_seasons || '?'} Temp.`}
                                    </p>
                                    <p class="text-[9px] text-slate-600">
                                        Año: ${(data.release_date || data.first_air_date || "N/A").split('-')[0]}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += cardHtml;
        }

        function toggleFavorite(id, title, type) {
            const index = favorites.findIndex(f => f.id === id && f.type === type);
            if(index === -1) {
                favorites.push({id, title, type});
            } else {
                favorites.splice(index, 1);
            }
            localStorage.setItem('myFavs', JSON.stringify(favorites));
            updateFavListUI();
            
            const stars = document.querySelectorAll(`button[onclick*="${id}"] i`);
            stars.forEach(s => {
                s.classList.toggle('fas');
                s.classList.toggle('far');
            });
        }

        function updateFavListUI() {
            const list = document.getElementById('favList');
            if(favorites.length === 0) {
                list.innerHTML = '<p class="text-slate-600 text-sm italic text-center p-4 glass rounded-2xl">Aún no has guardado nada en MyCinema.</p>';
                return;
            }
            list.innerHTML = favorites.map(f => `
                <div class="glass p-3 rounded-2xl flex justify-between items-center border border-slate-800/50 animate-fadeIn">
                    <span class="text-xs font-semibold text-slate-200">${f.title}</span>
                    <button onclick="removeFav(${f.id}, '${f.type}')" class="text-emerald-500 hover:text-red-500 transition-colors px-2">
                        <i class="fas fa-check-circle text-lg"></i>
                    </button>
                </div>
            `).join('');
        }

        function removeFav(id, type) {
            favorites = favorites.filter(f => !(f.id === id && f.type === type));
            localStorage.setItem('myFavs', JSON.stringify(favorites));
            updateFavListUI();
            const stars = document.querySelectorAll(`button[onclick*="${id}"] i`);
            stars.forEach(s => {
                s.classList.remove('fas');
                s.classList.add('far');
            });
        }

        updateFavListUI();
    </script>
</body>
</html>
