<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyCinema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Modal de Detalles Estilo Netflix */
        #detailsModal { 
            display: none; position: fixed; inset: 0; z-index: 9999; 
            background: #000; overflow-y: auto; padding-bottom: 40px;
        }
        .cast-scroll { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; }
        .cast-card { min-width: 80px; text-align: center; }
        .platform-icon { width: 40px; height: 40px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="pb-10">

    <div id="detailsModal" class="animate-in fade-in duration-300">
        <div id="modalContent">
            </div>
    </div>

    <nav class="sticky top-0 z-50 glass p-4 mb-6 flex justify-between items-center">
        <h1 class="text-2xl font-black text-blue-500 italic">MyCinema</h1>
        <button onclick="location.reload()" class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center">
            <i class="fas fa-sync-alt"></i>
        </button>
    </nav>

    <main class="max-w-3xl mx-auto px-4">
        <div class="glass rounded-2xl p-2 flex items-center mb-8">
            <input id="searchInput" type="text" placeholder="Busca una película o serie..." class="bg-transparent w-full p-3 outline-none">
            <button onclick="search()" class="bg-blue-600 px-6 py-3 rounded-xl active:scale-90 transition-all">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <div id="resultsGrid" class="space-y-4">
            <p class="text-center text-slate-500 py-10 italic">Busca algo para empezar...</p>
        </div>
    </main>

    <script>
        const API_KEY = 'c166cf26ff659581a08da20ca9391db3';

        // 1. BUSQUEDA INICIAL (Rápida y sin errores)
        async function search() {
            const q = document.getElementById('searchInput').value;
            if(!q) return;
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-3xl"></i></div>';

            try {
                const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(q)}&language=es-ES`);
                const data = await res.json();
                const items = data.results.filter(i => i.media_type !== 'person').slice(0, 12);

                grid.innerHTML = '';
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "glass p-4 rounded-2xl flex gap-4 items-center border border-white/5 active:bg-slate-800";
                    div.onclick = () => loadFullDetails(item.id, item.media_type);
                    div.innerHTML = `
                        <img src="${item.poster_path ? 'https://image.tmdb.org/t/p/w200'+item.poster_path : 'https://via.placeholder.com/100x150'}" class="w-16 h-24 object-cover rounded-lg">
                        <div class="flex-1">
                            <h3 class="font-bold text-lg leading-tight">${item.title || item.name}</h3>
                            <p class="text-xs text-blue-400 font-bold uppercase mt-1">${item.media_type === 'movie' ? 'Película' : 'Serie'}</p>
                            <button class="mt-2 text-[10px] bg-white/10 px-3 py-1 rounded-full text-slate-300">VER FICHA COMPLETA</button>
                        </div>
                    `;
                    grid.appendChild(div);
                });
            } catch (e) {
                grid.innerHTML = '<p class="text-red-400 text-center">Error al conectar.</p>';
            }
        }

        // 2. CARGA DE TODO (Tráiler, Reparto, Resumen y Plataformas)
        async function loadFullDetails(id, type) {
            const modal = document.getElementById('detailsModal');
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            document.getElementById('modalContent').innerHTML = '<div class="h-screen flex items-center justify-center"><i class="fas fa-spinner fa-spin text-4xl"></i></div>';

            try {
                // Pedimos TODO en una sola llamada: videos, créditos y proveedores
                const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&append_to_response=videos,credits,watch/providers&language=es-ES`);
                const data = await res.json();
                
                const trailer = data.videos?.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
                const cast = data.credits?.cast?.slice(0, 8) || [];
                const providers = data['watch/providers']?.results?.ES?.flatrate || []; // Plataformas en España

                document.getElementById('modalContent').innerHTML = `
                    <div class="relative w-full aspect-video bg-black">
                        ${trailer ? 
                            `<iframe class="w-full h-full" src="https://www.youtube-nocookie.com/embed/${trailer.key}?autoplay=1" frameborder="0" allowfullscreen></iframe>` 
                            : `<div class="w-full h-full flex items-center justify-center bg-slate-900 text-slate-500">Tráiler no disponible</div>`}
                        <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 w-10 h-10 rounded-full flex items-center justify-center border border-white/20"><i class="fas fa-times"></i></button>
                    </div>

                    <div class="p-6">
                        <h2 class="text-3xl font-black mb-2">${data.title || data.name}</h2>
                        <div class="flex gap-4 text-xs text-blue-400 font-bold mb-6">
                            <span>${data.release_date || data.first_air_date || ''}</span>
                            <span>★ ${data.vote_average?.toFixed(1)}</span>
                        </div>

                        <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Resumen</h4>
                        <p class="text-slate-300 text-sm leading-relaxed mb-8">${data.overview || 'No hay resumen disponible.'}</p>

                        <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Dónde Ver</h4>
                        <div class="flex gap-3 mb-8">
                            ${providers.length > 0 ? providers.map(p => `
                                <img src="https://image.tmdb.org/t/p/original${p.logo_path}" class="platform-icon" title="${p.provider_name}">
                            `).join('') : '<p class="text-xs text-slate-500 italic">No disponible en plataformas de suscripción.</p>'}
                        </div>

                        <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Reparto</h4>
                        <div class="cast-scroll">
                            ${cast.map(c => `
                                <div class="cast-card">
                                    <img src="${c.profile_path ? 'https://image.tmdb.org/t/p/w185'+c.profile_path : 'https://via.placeholder.com/80x80'}" class="w-16 h-16 rounded-full object-cover mx-auto mb-2 border border-white/10">
                                    <p class="text-[9px] font-bold line-clamp-1">${c.name}</p>
                                    <p class="text-[8px] text-slate-500 line-clamp-1">${c.character}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } catch (e) {
                alert("Error al cargar detalles.");
            }
        }

        function closeModal() {
            document.getElementById('detailsModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            document.getElementById('modalContent').innerHTML = '';
        }
    </script>
</body>
</html>
