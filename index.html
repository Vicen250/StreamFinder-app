<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyCinema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0b1120; color: #f1f5f9; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Capa del Tráiler (Modal) */
        #videoPlayerOverlay {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: rgba(7, 10, 18, 0.98); flex-direction: column;
            align-items: center; justify-content: center; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Efecto de Giro (Flip Card) */
        .flip-card { perspective: 1000px; height: 480px; }
        .flip-card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: 1.5rem; overflow: hidden;
        }
        .flip-card-back { 
            transform: rotateY(180deg); 
            background: #0f172a; 
            border: 2px solid #3b82f6; 
            display: flex; flex-direction: column;
        }

        .synopsis-scroll { max-height: 100px; overflow-y: auto; scrollbar-width: thin; }
        .synopsis-scroll::-webkit-scrollbar { width: 3px; }
        .synopsis-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <div id="videoPlayerOverlay">
        <button onclick="closeTrailer()" class="mb-6 bg-white/10 hover:bg-white/20 px-8 py-3 rounded-full border border-white/20 flex items-center gap-3 transition-all active:scale-90">
            <i class="fas fa-times text-xl"></i>
            <span class="font-bold tracking-widest text-sm uppercase">Cerrar Tráiler</span>
        </button>
        <div class="w-[92%] max-w-3xl aspect-video rounded-2xl overflow-hidden shadow-2xl border border-white/10 bg-black">
            <iframe id="ytIframe" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <nav class="sticky top-0 z-50 glass border-b border-white/10 p-4 mb-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent italic">MyCinema</h1>
            <button onclick="window.location.reload()" class="bg-slate-800 w-11 h-11 rounded-full flex items-center justify-center border border-white/10 active:scale-90 transition-transform shadow-lg">
                <i class="fas fa-home text-blue-400"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4">
        <div class="glass rounded-2xl p-2 flex items-center mb-10 border border-white/5 shadow-2xl">
            <input id="searchInput" type="text" placeholder="¿Qué película buscamos?" class="bg-transparent w-full p-3 outline-none text-slate-100 placeholder:text-slate-500">
            <button id="searchBtn" onclick="searchMedia()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl active:scale-95 transition-all shadow-lg">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <p class="col-span-full text-center text-slate-500 italic py-10">Escribe algo arriba para empezar...</p>
        </div>

        <section class="mt-12 border-t border-slate-800 pt-8 mb-20">
            <h3 class="text-xl font-bold mb-5 flex items-center gap-2.5 text-blue-400">
                <i class="fas fa-star"></i> Mis Favoritos
            </h3>
            <div id="favList" class="space-y-3"></div>
        </section>
    </main>

    <script>
        // --- CAMBIA ESTO POR TU API KEY ---
        const API_KEY = 'c166cf26ff659581a08da20ca9391db3'; 
        // ----------------------------------

        let favorites = JSON.parse(localStorage.getItem('myFavs')) || [];
        let currentAbortController = null;

        // Control del Reproductor
        function openTrailer(key) {
            const overlay = document.getElementById('videoPlayerOverlay');
            const iframe = document.getElementById('ytIframe');
            iframe.src = `https://www.youtube-nocookie.com/embed/${key}?autoplay=1&rel=0`;
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden'; 
        }

        function closeTrailer() {
            const overlay = document.getElementById('videoPlayerOverlay');
            const iframe = document.getElementById('ytIframe');
            iframe.src = ''; 
            overlay.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Buscador Principal
        async function searchMedia(customQuery = null) {
            const query = customQuery || document.getElementById('searchInput').value;
            if(!query) return;
            if(!customQuery) document.getElementById('searchInput').value = query;

            if (currentAbortController) currentAbortController.abort();
            currentAbortController = new AbortController();
            const signal = currentAbortController.signal;

            const grid = document.getElementById('resultsGrid');
            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            grid.innerHTML = '<div class="col-span-full text-center py-12"><i class="fas fa-circle-notch fa-spin text-4xl text-blue-500"></i><p class="mt-4 text-slate-500 text-sm italic">Conectando con TMDB de forma segura...</p></div>';
            
            try {
                const searchRes = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=es-ES`, { signal });
                const searchData = await searchRes.json();
                
                // Filtramos solo Películas y Series (Máximo 5 para evitar error 500)
                const items = searchData.results.filter(i => i.media_type === 'movie' || i.media_type === 'tv').slice(0, 5);

                if(items.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center text-slate-500">No se han encontrado resultados.</p>';
                    btn.disabled = false; return;
                }

                grid.innerHTML = ''; 
                
                for (const item of items) {
                    if (signal.aborted) break;

                    // Pausa de 300ms entre peticiones para evitar saturar la API
                    await new Promise(r => setTimeout(r, 300));

                    try {
                        const res = await fetch(`https://api.themoviedb.org/3/${item.media_type}/${item.id}?api_key=${API_KEY}&append_to_response=credits,videos&language=es-ES`, { signal });
                        
                        if(res.status === 500) continue; // Si falla uno, saltamos al siguiente

                        const data = await res.json();
                        renderCard({ ...data, media_type: item.media_type });
                    } catch (e) {
                        console.log("Error en resultado individual");
                    }
                }
            } catch (e) {
                if (e.name !== 'AbortError') {
                    grid.innerHTML = '<p class="col-span-full text-center text-red-400">Error de conexión. Revisa tu API Key o conexión.</p>';
                }
            } finally {
                btn.disabled = false;
            }
        }

        // Pintar Tarjeta
        function renderCard(data) {
            const grid = document.getElementById('resultsGrid');
            const trailer = data.videos?.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
            const isFav = favorites.some(f => f.id === data.id);
            const cardId = `card-${data.id}`;

            const cardHtml = `
                <div class="flip-card" id="${cardId}">
                    <div class="flip-card-inner">
                        <div class="flip-card-front bg-slate-900 border border-slate-800 flex flex-col shadow-2xl">
                            <div class="relative h-60 shrink-0 cursor-pointer" onclick="document.getElementById('${cardId}').classList.toggle('flipped')">
                                <img src="${data.poster_path ? 'https://image.tmdb.org/t/p/w500'+data.poster_path : 'https://via.placeholder.com/500x750?text=Sin+Imagen'}" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent"></div>
                                <div class="absolute bottom-3 left-4 right-4">
                                    <h2 class="text-xl font-bold text-white line-clamp-1">${data.title || data.name}</h2>
                                    <div class="flex gap-2 mt-1">
                                        <span class="text-[9px] bg-blue-600/40 text-blue-300 px-2 py-0.5 rounded border border-blue-500/30 uppercase font-black">${data.media_type}</span>
                                        <span class="text-[9px] bg-slate-800 text-yellow-500 px-2 py-0.5 rounded border border-slate-700 font-bold">★ ${data.vote_average?.toFixed(1) || '0'}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="p-5 flex-1 flex flex-col">
                                <div class="synopsis-scroll mb-4 cursor-pointer" onclick="document.getElementById('${cardId}').classList.toggle('flipped')">
                                    <p class="text-slate-400 text-xs leading-relaxed line-clamp-4">${data.overview || "No hay sinopsis disponible en este momento."}</p>
                                </div>
                                <div class="mt-auto flex items-center justify-between pt-3 border-t border-white/5">
                                    ${trailer ? `
                                        <button onclick="openTrailer('${trailer.key}')" class="text-red-500 text-3xl active:scale-125 transition-transform flex items-center gap-2">
                                            <i class="fab fa-youtube"></i>
                                            <span class="text-[10px] text-white uppercase font-bold tracking-tighter">Ver Trailer</span>
                                        </button>` : '<span class="text-[10px] text-slate-600 italic">No disponible</span>'}
                                    
                                    <button onclick="toggleFavorite(${data.id}, '${(data.title || data.name).replace(/'/g, "")}', '${data.media_type}')" class="text-2xl text-yellow-500 active:scale-110 transition-transform">
                                        <i class="${isFav ? 'fas' : 'far'} fa-star"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="flip-card-back p-6 flex flex-col items-center justify-between">
                            <h3 class="font-bold text-blue-400 text-center w-full truncate border-b border-white/5 pb-2">${data.title || data.name}</h3>
                            <div class="w-full">
                                <p class="text-[9px] text-slate-500 uppercase tracking-widest text-center mb-4">Reparto Principal</p>
                                <div class="grid grid-cols-4 gap-2">
                                    ${(data.credits?.cast || []).slice(0,4).map(a => `
                                        <div class="text-center">
                                            <img src="${a.profile_path ? 'https://image.tmdb.org/t/p/w185'+a.profile_path : 'https://via.placeholder.com/100?text=?'}" class="w-12 h-12 rounded-full mx-auto object-cover border-2 border-slate-800 shadow-md">
                                            <p class="text-[7px] text-slate-400 mt-1 line-clamp-1">${a.name}</p>
                                        </div>`).join('')}
                                </div>
                            </div>
                            <div class="w-full space-y-3">
                                <button onclick="searchMedia('${(data.title || data.name).replace(/'/g, "")}')" class="w-full bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-[10px] font-bold border border-white/5 active:scale-95 transition-all">
                                    BUSCAR SIMILARES
                                </button>
                                <button onclick="document.getElementById('${cardId}').classList.remove('flipped')" class="w-full bg-blue-600/20 text-blue-400 py-3 rounded-xl text-[10px] font-bold border border-blue-500/30 active:scale-95 transition-all">
                                    VOLVER A LA FICHA
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
            grid.innerHTML += cardHtml;
        }

        // Favoritos
        function toggleFavorite(id, title, type) {
            const index = favorites.findIndex(f => f.id === id);
            if(index === -1) favorites.push({id, title, type});
            else favorites.splice(index, 1);
            localStorage.setItem('myFavs', JSON.stringify(favorites));
            updateFavListUI();
            const stars = document.querySelectorAll(`button[onclick*="${id}"] i`);
            stars.forEach(s => { s.classList.toggle('fas'); s.classList.toggle('far'); });
        }

        function updateFavListUI() {
            const list = document.getElementById('favList');
            if(favorites.length === 0) {
                list.innerHTML = '<p class="text-slate-600 text-sm italic text-center p-8 glass rounded-3xl">Tus favoritos aparecerán aquí.</p>';
                return;
            }
            list.innerHTML = favorites.map(f => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center border border-white/5 shadow-lg">
                    <div class="flex flex-col">
                        <span class="text-xs font-bold text-slate-200">${f.title}</span>
                        <span class="text-[8px] text-blue-400 uppercase font-black tracking-widest">${f.type}</span>
                    </div>
                    <button onclick="removeFav(${f.id})" class="text-emerald-500 active:scale-90 transition-transform">
                        <i class="fas fa-check-circle text-2xl"></i>
                    </button>
                </div>`).join('');
        }

        function removeFav(id) {
            favorites = favorites.filter(f => f.id !== id);
            localStorage.setItem('myFavs', JSON.stringify(favorites));
            updateFavListUI();
            searchMedia();
        }

        updateFavListUI();
    </script>
</body>
</html>
