<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFinder Pro v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0b1120; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05); }
        /* Degradado negro agresivo para el título sobre la imagen */
        .title-gradient { background: linear-gradient(0deg, rgba(11,17,32,1) 0%, rgba(11,17,32,0.8) 50%, rgba(11,17,32,0) 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 pb-24">

    <main class="max-w-2xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent tracking-tight">StreamFinder</h1>
        </header>

        <div class="glass rounded-2xl p-2 flex items-center mb-6 shadow-xl">
            <input id="searchInput" type="text" placeholder="Busca película o serie..." class="bg-transparent w-full p-3 outline-none text-slate-100 placeholder:text-slate-500">
            <button onclick="searchMedia()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl transition-all shadow-md">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <div id="resultContainer" class="hidden mb-10">
            <div class="rounded-3xl overflow-hidden shadow-2xl border border-slate-800 bg-slate-950">
                
                <div class="relative h-80 overflow-hidden">
                    <img id="poster" src="" class="w-full h-full object-cover">
                    <div class="absolute inset-x-0 bottom-0 h-40 title-gradient"></div>
                    
                    <div class="absolute inset-x-0 bottom-0 p-6 flex justify-between items-end">
                        <h2 id="title" class="text-3xl font-bold leading-tight flex-1 text-white pr-4 tracking-tight"></h2>
                        <button id="favBtn" onclick="toggleFavorite()" class="text-2xl hover:scale-110 transition-transform bg-black/40 p-3 rounded-full backdrop-blur-sm border border-white/10">
                            <i class="far fa-star text-yellow-400"></i>
                        </button>
                    </div>
                </div>

                <div class="p-6 space-y-6">
                    <div class="flex gap-2 flex-wrap">
                        <span id="year" class="bg-slate-800 px-3 py-1 rounded-full text-xs text-slate-300 font-medium"></span>
                        <span id="extraInfo" class="bg-blue-950/70 text-blue-300 px-3 py-1 rounded-full text-xs font-medium border border-blue-800"></span>
                    </div>

                    <section>
                        <h3 class="text-xs font-bold tracking-widest mb-2 text-slate-500 uppercase">Sinopsis</h3>
                        <p id="overview" class="text-slate-300 text-sm leading-relaxed"></p>
                    </section>

                    <section class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                        <div class="flex items-center gap-2 mb-1.5">
                            <span id="ratingTag" class="font-bold text-yellow-500 text-sm bg-yellow-950/50 px-2 py-0.5 rounded"></span>
                            <span class="text-[10px] text-slate-500">| Clasificación de contenido</span>
                        </div>
                        <p id="ratingLegend" class="text-[11px] text-slate-400 italic leading-relaxed"></p>
                    </section>

                    <section>
                        <h3 class="text-xs font-bold tracking-widest mb-3 text-slate-500 uppercase">Dónde Ver (Streaming)</h3>
                        <div id="platforms" class="flex flex-wrap gap-4"></div>
                    </section>
                </div>
            </div>
        </div>

        <section class="mt-8">
            <h3 class="text-xl font-bold mb-5 flex items-center gap-2.5">
                <i class="fas fa-bookmark text-blue-500"></i> Mis Favoritos
            </h3>
            <div id="favList" class="space-y-3 custom-scrollbar">
                <p class="text-slate-600 text-sm italic p-4 glass rounded-xl text-center">Aún no tienes favoritos guardados.</p>
            </div>
        </section>
    </main>

    <script>
        const API_KEY = 'c166cf26ff659581a08da20ca9391db3'; // <--- PEGA TU CLAVE AQUÍ
        let currentItem = null;
        let favorites = JSON.parse(localStorage.getItem('myFavs')) || [];

        async function searchMedia() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            const container = document.getElementById('resultContainer');
            
            try {
                // Buscador multi (pelis y series)
                const searchRes = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${query}&language=es-ES`);
                const searchData = await searchRes.json();
                const item = searchData.results[0];
                if(!item || (item.media_type !== 'movie' && item.media_type !== 'tv')) return alert("No se encontraron resultados válidos.");

                // Obtener detalles extendidos (plataformas, clasificación, etc.)
                const detailsRes = await fetch(`https://api.themoviedb.org/3/${item.media_type}/${item.id}?api_key=${API_KEY}&append_to_response=watch/providers,release_dates,content_ratings&language=es-ES`);
                const data = await detailsRes.json();
                
                currentItem = { ...data, media_type: item.media_type };
                renderApp(currentItem);
                container.scrollIntoView({ behavior: 'smooth' }); // Scroll automático al resultado
            } catch (e) { alert("Error de conexión con la API."); }
        }

        function renderApp(data) {
            document.getElementById('resultContainer').classList.remove('hidden');
            document.getElementById('title').innerText = data.title || data.name;
            document.getElementById('overview').innerText = data.overview || "Sinopsis no disponible en español.";
            document.getElementById('year').innerText = (data.release_date || data.first_air_date || "N/A").split('-')[0];
            document.getElementById('poster').src = data.poster_path ? `https://image.tmdb.org/t/p/w780${data.poster_path}` : 'https://via.placeholder.com/780x1170?text=Sin+Imagen';

            // Campo 1: Duración (Pelis) o Temporadas (Series)
            const extra = document.getElementById('extraInfo');
            if(data.media_type === 'movie') {
                extra.innerHTML = data.runtime ? `<i class="far fa-clock mr-1"></i> ${data.runtime} min` : "Duración N/A";
            } else {
                extra.innerHTML = data.number_of_seasons ? `<i class="fas fa-tv mr-1"></i> ${data.number_of_seasons} Temporadas` : "Serie";
            }

            // Campo 2: Calificación y Leyenda (Simplificado)
            const rating = data.adult ? "R / +18" : "Público General";
            document.getElementById('ratingTag').innerText = rating;
            document.getElementById('ratingLegend').innerText = data.adult ? 
                "Contenido para adultos. Puede incluir violencia explícita, lenguaje fuerte o escenas de naturaleza sexual." : 
                "Apto para todos los públicos o bajo supervisión parental. Contenido generalmente inofensivo.";

            // 4- Plataformas (Región ES)
            const platformsDiv = document.getElementById('platforms');
            platformsDiv.innerHTML = '';
            const providers = data['watch/providers']?.results?.ES?.flatrate || [];
            
            if(providers.length > 0) {
                providers.forEach(p => {
                    platformsDiv.innerHTML += `
                        <div class="flex flex-col items-center gap-1">
                            <img src="https://image.tmdb.org/t/p/original${p.logo_path}" class="w-12 h-12 rounded-xl shadow-lg border border-slate-700" title="${p.provider_name}">
                            <span class="text-[9px] text-slate-500 w-14 text-center truncate">${p.provider_name}</span>
                        </div>`;
                });
            } else {
                platformsDiv.innerHTML = '<span class="text-sm text-slate-500 italic bg-slate-900 px-4 py-2 rounded-lg border border-slate-800">No disponible en suscripción actual en España.</span>';
            }

            // Actualizar interfaz de favoritos
            updateFavIcon();
            updateFavListUI();
        }

        // --- LÓGICA DE FAVORITOS (LocalStorage) ---
        function toggleFavorite() {
            if(!currentItem) return;
            const index = favorites.findIndex(f => f.id === currentItem.id && f.type === currentItem.media_type);
            if(index === -1) {
                favorites.push({id: currentItem.id, title: currentItem.title || currentItem.name, type: currentItem.media_type});
            } else {
                favorites.splice(index, 1);
            }
            localStorage.setItem('myFavs', JSON.stringify(favorites));
            updateFavIcon();
            updateFavListUI();
        }

        function updateFavIcon() {
            const icon = document.querySelector('#favBtn i');
            if(!currentItem) return;
            const isFav = favorites.some(f => f.id === currentItem.id && f.type === currentItem.media_type);
            icon.className = isFav ? "fas fa-star text-yellow-400" : "far fa-star text-yellow-400";
        }

        function updateFavListUI() {
            const list = document.getElementById('favList');
            if(favorites.length === 0) {
                list.innerHTML = '<p class="text-slate-600 text-sm italic p-4 glass rounded-xl text-center">Aún no tienes favoritos guardados.</p>';
                return;
            }
            list.innerHTML = favorites.map(f => `
                <div class="glass p-3 rounded-xl flex justify-between items-center animate-fade-in border border-slate-800/50 hover:border-slate-700 transition-colors">
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-bold ${f.type === 'movie' ? 'text-cyan-400 bg-cyan-950/50' : 'text-purple-400 bg-purple-950/50'} uppercase px-2 py-0.5 rounded">${f.type === 'movie' ? 'Cine' : 'Serie'}</span>
                        <span class="text-sm font-medium text-slate-100">${f.title}</span>
                    </div>
                    <button onclick="removeFav(${f.id}, '${f.type}')" class="text-emerald-500 hover:text-red-500 transition-colors p-1.5" title="Eliminar de favoritos">
                        <i class="fas fa-check-circle text-xl"></i>
                    </button>
                </div>
            `).join('');
        }

        function removeFav(id, type) {
            favorites = favorites.filter(f => !(f.id === id && f.type === type));
            localStorage.setItem('myFavs', JSON.stringify(favorites));
            updateFavListUI();
            // Actualizar estrella si el elemento borrado es el que se está mostrando
            if(currentItem && currentItem.id === id && currentItem.media_type === type) updateFavIcon();
        }

        // Cargar lista al iniciar la app
        updateFavListUI();
    </script>
</body>
</html>
