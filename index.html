<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyCinema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0b1120; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05); }
        
        .flip-card { perspective: 1000px; height: 460px; }
        .flip-card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s; transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: 1.5rem; overflow: hidden;
        }
        .flip-card-back { transform: rotateY(180deg); background: #0f172a; border: 2px solid #3b82f6; }

        .synopsis-scroll { max-height: 100px; overflow-y: auto; padding-right: 5px; }
        .synopsis-scroll::-webkit-scrollbar { width: 3px; }
        .synopsis-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <nav class="sticky top-0 z-50 glass border-b border-white/10 p-4 mb-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent italic">MyCinema</h1>
            <button onclick="window.location.reload()" class="bg-slate-800 hover:bg-slate-700 w-10 h-10 rounded-full flex items-center justify-center transition-all border border-slate-700">
                <i class="fas fa-home text-blue-400"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4">
        <div class="glass rounded-2xl p-2 flex items-center mb-8 shadow-xl border border-white/5">
            <input id="searchInput" type="text" placeholder="¿Qué buscamos hoy?" class="bg-transparent w-full p-3 outline-none text-slate-100">
            <button id="searchBtn" onclick="searchMedia()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl transition-all">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <p class="col-span-full text-center text-slate-500 italic py-10">Busca una película o serie para empezar...</p>
        </div>

        <section class="mt-12 border-t border-slate-800 pt-8">
            <h3 class="text-xl font-bold mb-5 flex items-center gap-2.5 text-blue-400"><i class="fas fa-star"></i> Mis Favoritos</h3>
            <div id="favList" class="space-y-3"></div>
        </section>
    </main>

    <script>
        const API_KEY = 'c166cf26ff659581a08da20ca9391db3'; 
        let favorites = JSON.parse(localStorage.getItem('myFavs')) || [];
        let currentAbortController = null;

        async function searchMedia(customQuery = null) {
            const query = customQuery || document.getElementById('searchInput').value;
            if(!query) return;
            if(!customQuery) document.getElementById('searchInput').value = query;

            if (currentAbortController) currentAbortController.abort();
            currentAbortController = new AbortController();
            const signal = currentAbortController.signal;

            const grid = document.getElementById('resultsGrid');
            const btn = document.getElementById('searchBtn');
            
            btn.disabled = true;
            grid.innerHTML = '<div class="col-span-full text-center py-10"><i class="fas fa-circle-notch fa-spin text-3xl text-blue-500"></i><p class="mt-4 text-slate-500">Conectando con la base de datos...</p></div>';
            
            try {
                const searchRes = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=es-ES`, { signal });
                const searchData = await searchRes.json();
                const items = searchData.results.filter(i => i.media_type === 'movie' || i.media_type === 'tv').slice(0, 6);

                if(items.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center text-slate-500">No se encontraron resultados para esta búsqueda.</p>';
                    btn.disabled = false; return;
                }

                grid.innerHTML = ''; 
                for (const item of items) {
                    if (signal.aborted) break;
                    await new Promise(r => setTimeout(r, 200));
                    try {
                        const res = await fetch(`https://api.themoviedb.org/3/${item.media_type}/${item.id}?api_key=${API_KEY}&append_to_response=watch/providers,release_dates,content_ratings,credits,videos&language=es-ES`, { signal });
                        const data = await res.json();
                        renderCard({ ...data, media_type: item.media_type });
                    } catch (e) { if (e.name !== 'AbortError') console.log("Error item"); }
                }
            } catch (e) { if (e.name !== 'AbortError') grid.innerHTML = 'Error de conexión'; }
            finally { btn.disabled = false; }
        }

        function renderCard(data) {
            const grid = document.getElementById('resultsGrid');
            
            let rating = "T.P.";
            if (data.media_type === 'movie') {
                const release = data.release_dates?.results?.find(r => r.iso_3166_1 === 'ES');
                rating = release?.release_dates[0]?.certification || "T.P.";
            } else {
                const ratingES = data.content_ratings?.results?.find(r => r.iso_3166_1 === 'ES');
                rating = ratingES?.rating || "T.P.";
            }

            const trailer = data.videos?.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
            const ytLink = trailer ? `https://www.youtube.com/watch?v=${trailer.key}` : `https://www.youtube.com/results?search_query=${encodeURIComponent(data.title || data.name)}+trailer`;

            const isFav = favorites.some(f => f.id === data.id);
            const cardId = `card-${data.id}`;

            const cardHtml = `
                <div class="flip-card" id="${cardId}">
                    <div class="flip-card-inner">
                        <div class="flip-card-front bg-slate-900 border border-slate-800 flex flex-col shadow-2xl">
                            <div class="relative h-56 shrink-0 cursor-pointer" onclick="document.getElementById('${cardId}').classList.toggle('flipped')">
                                <img src="${data.poster_path ? 'https://image.tmdb.org/t/p/w500'+data.poster_path : 'https://via.placeholder.com/500x750?text=MyCinema'}" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent"></div>
                                <div class="absolute bottom-2 left-4 right-4">
                                    <h2 class="text-xl font-bold text-white line-clamp-1">${data.title || data.name}</h2>
                                    <span class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-yellow-500 font-bold border border-slate-700">${rating}</span>
                                </div>
                            </div>
                            
                            <div class="p-4 flex-1 flex flex-col">
                                <div class="synopsis-scroll mb-4 cursor-pointer" onclick="document.getElementById('${cardId}').classList.toggle('flipped')">
                                    <p class="text-slate-300 text-[11px] leading-relaxed">${data.overview || "Sinopsis no disponible."}</p>
                                </div>
                                
                                <div class="mt-auto flex items-center justify-between border-t border-slate-800/50 pt-3">
                                    <div class="flex gap-2">
                                        ${(data['watch/providers']?.results?.ES?.flatrate || []).slice(0,3).map(p => `
                                            <img src="https://image.tmdb.org/t/p/original${p.logo_path}" class="w-7 h-7 rounded border border-slate-700">
                                        `).join('')}
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <a href="${ytLink}" target="_blank" rel="noopener noreferrer" class="text-red-500 text-2xl">
                                            <i class="fab fa-youtube"></i>
                                        </a>
                                        <button onclick="toggleFavorite(${data.id}, '${(data.title || data.name).replace(/'/g, "")}', '${data.media_type}')" class="text-2xl text-yellow-500">
                                            <i class="${isFav ? 'fas' : 'far'} fa-star"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="flip-card-back p-5 flex flex-col items-center justify-between border-2 border-blue-500">
                            <div class="w-full text-center">
                                <h3 class="font-bold text-blue-400 mb-2 truncate px-4">${data.title || data.name}</h3>
                                <div class="flex items-center justify-center gap-1 mb-4">
                                    <i class="fas fa-star text-yellow-500 text-xs"></i>
                                    <span class="text-sm font-bold text-white">${data.vote_average?.toFixed(1) || 'N/A'}</span>
                                    <span class="text-[10px] text-slate-500">/ 10</span>
                                </div>
                            </div>

                            <div class="w-full">
                                <div class="grid grid-cols-4 gap-2">
                                    ${(data.credits?.cast || []).slice(0,4).map(actor => `
                                        <div class="flex flex-col items-center">
                                            <img src="${actor.profile_path ? 'https://image.tmdb.org/t/p/w185'+actor.profile_path : 'https://via.placeholder.com/100?text=?'}" 
                                                 class="w-12 h-12 rounded-full object-cover border-2 border-slate-800 shadow-md">
                                            <p class="text-[8px] text-slate-400 mt-1 text-center line-clamp-1">${actor.name}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <div class="w-full space-y-3 mt-4">
                                <button onclick="searchMedia('${(data.title || data.name).replace(/'/g, "")}')" 
                                        class="w-full bg-slate-800 py-2 rounded-xl text-[10px] font-bold border border-slate-700">
                                    BUSCAR RELACIONADOS
                                </button>
                                <button onclick="document.getElementById('${cardId}').classList.remove('flipped')" 
                                        class="w-full bg-blue-600/20 text-blue-400 py-2 rounded-xl text-[10px] font-bold border border-blue-500/30">
                                    VOLVER
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
            grid.innerHTML += cardHtml;
        }

        function toggleFavorite(id, title, type) {
            const index = favorites.findIndex(f => f.id === id);
            if(index === -1) favorites.push({id, title, type});
            else favorites.splice(index, 1);
            localStorage.setItem('myFavs', JSON.stringify(favorites));
            updateFavListUI();
            searchMedia(); // Refrescar para actualizar estrellas
        }

        function updateFavListUI() {
            const list = document.getElementById('favList');
            if(favorites.length === 0) {
                list.innerHTML = '<p class="text-slate-600 text-sm italic text-center p-4 glass rounded-2xl">Sin favoritos.</p>';
                return;
            }
            list.innerHTML = favorites.map(f => `
                <div class="glass p-3 rounded-2xl flex justify-between items-center border border-slate-800/50">
                    <span class="text-xs font-semibold text-slate-200">${f.title}</span>
                    <button onclick="removeFav(${f.id})" class="text-emerald-500 px-2"><i class="fas fa-check-circle text-lg"></i></button>
                </div>`).join('');
        }

        function removeFav(id) {
            favorites = favorites.filter(f => f.id !== id);
            localStorage.setItem('myFavs', JSON.stringify(favorites));
            updateFavListUI();
            searchMedia();
        }

        updateFavListUI();
    </script>
</body>
</html>
