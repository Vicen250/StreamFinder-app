<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyCinema Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0b1120; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05); }
        #videoOverlay { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; }
        .movie-card { background: #1e293b; border-radius: 1.5rem; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s; }
        .movie-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="videoOverlay">
        <button onclick="closeVideo()" class="mb-6 bg-blue-600 px-8 py-3 rounded-full font-bold uppercase tracking-widest active:scale-90 transition-all">Cerrar</button>
        <div class="w-[92%] aspect-video bg-black rounded-xl overflow-hidden border border-white/10">
            <iframe id="ytIframe" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <nav class="sticky top-0 z-50 glass border-b border-white/10 p-4 mb-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-500 italic">MyCinema</h1>
            <button onclick="location.reload()" class="bg-slate-800 w-10 h-10 rounded-full flex items-center justify-center"><i class="fas fa-home"></i></button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4">
        <div class="glass rounded-2xl p-2 flex items-center mb-8">
            <input id="searchInput" type="text" placeholder="Escribe una película..." class="bg-transparent w-full p-3 outline-none">
            <button onclick="search()" class="bg-blue-600 px-6 py-3 rounded-xl"><i class="fas fa-search"></i></button>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </main>

    <script>
        const API_KEY = 'c166cf26ff659581a08da20ca9391db3';

        // 1. BUSQUEDA SIMPLE (Sin pedir detalles pesados)
        async function search() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '<p class="text-center py-10 col-span-full italic">Buscando...</p>';

            try {
                const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=es-ES`);
                const data = await res.json();
                const items = data.results.filter(i => i.media_type !== 'person').slice(0, 10);

                grid.innerHTML = '';
                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'movie-card flex p-3 gap-4';
                    card.innerHTML = `
                        <img src="https://image.tmdb.org/t/p/w200${item.poster_path}" class="w-24 h-36 object-cover rounded-lg shadow-lg" onerror="this.src='https://via.placeholder.com/200x300?text=No+Img'">
                        <div class="flex-1 flex flex-col justify-between">
                            <div>
                                <h2 class="font-bold text-lg leading-tight line-clamp-2">${item.title || item.name}</h2>
                                <p class="text-[10px] text-blue-400 font-bold uppercase mt-1">${item.media_type === 'movie' ? 'Película' : 'Serie'}</p>
                            </div>
                            <button onclick="loadDetails(${item.id}, '${item.media_type}')" class="bg-slate-700/50 py-2 rounded-lg text-xs font-bold border border-white/5 active:bg-blue-600 transition-colors">
                                VER TRÁILER Y MÁS
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                grid.innerHTML = '<p class="text-red-400 text-center col-span-full">Error de conexión.</p>';
            }
        }

        // 2. CARGA DE DETALLES SOLO AL HACER CLIC (Evita el Error 500)
        async function loadDetails(id, type) {
            try {
                // Solo pedimos los detalles de UNA película (la que pulsaste)
                const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&append_to_response=videos&language=es-ES`);
                const data = await res.json();
                
                const trailer = data.videos?.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
                
                if(trailer) {
                    const iframe = document.getElementById('ytIframe');
                    iframe.src = `https://www.youtube-nocookie.com/embed/${trailer.key}?autoplay=1`;
                    document.getElementById('videoOverlay').style.display = 'flex';
                } else {
                    alert("Lo sentimos, no hay tráiler disponible para este título.");
                }
            } catch (e) {
                alert("Error al conectar con el servidor. Inténtalo de nuevo.");
            }
        }

        function closeVideo() {
            document.getElementById('ytIframe').src = '';
            document.getElementById('videoOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
