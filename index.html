<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyCinema Pro v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #070b14; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .result-item { background: #111827; border: 1px solid #1f2937; border-radius: 12px; transition: 0.3s; }
        #detailView { display: none; position: fixed; inset: 0; background: #070b14; z-index: 100; overflow-y: auto; padding: 20px; }
        .cast-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #3b82f6; }
        .badge-info { background: rgba(59, 130, 246, 0.1); color: #60a5fa; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; border: 1px solid rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="p-4">

    <div id="detailView">
        <button onclick="closeDetails()" class="mb-6 bg-slate-800 text-white px-6 py-2 rounded-full font-bold border border-white/10">
            <i class="fas fa-arrow-left mr-2"></i> VOLVER
        </button>
        <div id="detailContent"></div>
    </div>

    <div id="mainView">
        <h1 class="text-3xl font-black text-center text-blue-500 mb-8 italic">MyCinema <span class="text-white">PRO</span></h1>
        
        <div class="flex gap-2 mb-10">
            <input id="searchInput" type="text" placeholder="Busca película o serie..." class="bg-slate-900 w-full p-4 rounded-xl border border-slate-800 outline-none">
            <button onclick="performSearch()" class="bg-blue-600 px-6 rounded-xl active:scale-95"><i class="fas fa-search"></i></button>
        </div>

        <div id="resultsArea" class="space-y-4"></div>
    </div>

    <script>
        const API_KEY = 'c166cf26ff659581a08da20ca9391db3';

        async function performSearch() {
            const q = document.getElementById('searchInput').value;
            if(!q) return;
            const area = document.getElementById('resultsArea');
            area.innerHTML = '<p class="text-center animate-pulse">Buscando...</p>';
            try {
                const response = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(q)}&language=es-ES`);
                const data = await response.json();
                area.innerHTML = "";
                data.results.filter(i => i.media_type !== 'person').slice(0, 10).forEach(item => {
                    const div = document.createElement('div');
                    div.className = "result-item p-4 flex justify-between items-center";
                    div.innerHTML = `
                        <div>
                            <h3 class="font-bold text-lg leading-tight">${item.title || item.name}</h3>
                            <p class="text-[10px] text-blue-400 font-bold uppercase">${item.media_type === 'movie' ? 'Película' : 'Serie'}</p>
                        </div>
                        <button onclick="openFullDetails(${item.id}, '${item.media_type}')" class="bg-blue-600 px-4 py-2 rounded-lg text-xs font-bold shadow-lg">DETALLES</button>
                    `;
                    area.appendChild(div);
                });
            } catch (e) { area.innerHTML = "Error de conexión."; }
        }

        async function openFullDetails(id, type) {
            const detailView = document.getElementById('detailView');
            const content = document.getElementById('detailContent');
            detailView.style.display = 'block';
            content.innerHTML = '<p class="text-center mt-20">Cargando información completa...</p>';

            try {
                const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&append_to_response=videos,credits,watch/providers&language=es-ES`);
                const d = await res.json();
                
                const trailer = d.videos?.results?.find(v => v.type === 'Trailer');
                const cast = d.credits?.cast?.slice(0, 6) || [];
                
                // LÓGICA DE DURACIÓN / TEMPORADAS
                let durationText = "";
                if (type === 'movie') {
                    durationText = `<span class="badge-info"><i class="far fa-clock mr-1"></i> ${d.runtime} min</span>`;
                } else {
                    durationText = `
                        <span class="badge-info"><i class="fas fa-layer-group mr-1"></i> ${d.number_of_seasons} Temp.</span>
                        <span class="badge-info"><i class="fas fa-tv mr-1"></i> ${d.number_of_episodes} Caps.</span>
                    `;
                }

                content.innerHTML = `
                    <div class="rounded-2xl overflow-hidden bg-black mb-6 border border-white/10">
                        ${trailer ? `<iframe class="w-full aspect-video" src="https://www.youtube-nocookie.com/embed/${trailer.key}?autoplay=1" frameborder="0" allowfullscreen></iframe>` 
                        : `<div class="p-10 text-center text-slate-500 italic">No hay video disponible</div>`}
                    </div>

                    <h2 class="text-3xl font-black mb-3">${d.title || d.name}</h2>
                    
                    <div class="flex flex-wrap gap-2 mb-6">
                        <span class="badge-info text-yellow-500 border-yellow-500/30">★ ${d.vote_average?.toFixed(1)}</span>
                        ${durationText}
                        <span class="badge-info">${new Date(d.release_date || d.first_air_date).getFullYear()}</span>
                    </div>

                    <div class="space-y-6">
                        <section>
                            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 italic">Sinopsis Oficial</h4>
                            <p class="text-sm leading-relaxed text-slate-300">${d.overview || 'Sin descripción disponible.'}</p>
                        </section>

                        <section>
                            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4 italic">Actores Principales</h4>
                            <div class="flex gap-4 overflow-x-auto pb-4">
                                ${cast.map(c => `
                                    <div class="flex-shrink-0 text-center w-20">
                                        <img src="https://image.tmdb.org/t/p/w185${c.profile_path}" class="cast-img mx-auto mb-2" onerror="this.src='https://via.placeholder.com/60?text=?'">
                                        <p class="text-[9px] font-bold line-clamp-1">${c.name}</p>
                                        <p class="text-[8px] text-slate-500 line-clamp-1">${c.character}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </section>
                    </div>
                `;
            } catch (e) { content.innerHTML = "Error al cargar la ficha."; }
        }

        function closeDetails() {
            document.getElementById('detailView').style.display = 'none';
            document.getElementById('detailContent').innerHTML = '';
        }
    </script>
</body>
</html>
